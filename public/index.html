<!doctype html>
<html lang="en" data-theme="synergy" data-scheme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>bd-console</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23131313'/%3E%3Cpath d='M16 6l8 10-8 10-8-10z' fill='%2339ff14'/%3E%3C/svg%3E">

    <!-- Apply saved theme before first paint (no flash of wrong theme). -->
    <script>
      (function () {
        try {
          var preset = localStorage.getItem('bd_theme_preset') || 'synergy';
          var scheme = localStorage.getItem('bd_theme_scheme') || 'auto';
          var resolved = scheme === 'light' || scheme === 'dark'
            ? scheme
            : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var r = document.documentElement;
          r.setAttribute('data-theme', preset);
          r.setAttribute('data-scheme', resolved);
          r.classList.toggle('sl-theme-dark', resolved === 'dark');
          r.classList.toggle('sl-theme-light', resolved !== 'dark');
        } catch (e) {}
      })();
    </script>

    <!-- Design foundation: Open Props tokens, Shoelace base theme, app styles. -->
    <link rel="stylesheet" href="/vendor/open-props/normalize.min.css" />
    <link rel="stylesheet" href="/vendor/open-props/open-props.min.css" />
    <link rel="stylesheet" href="/vendor/shoelace/themes/light.css" />
    <link rel="stylesheet" href="/vendor/shoelace/themes/dark.css" />
    <link rel="stylesheet" href="/vendor/fonts/fonts.css" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/ui/console2/console2.css" />

    <!-- Bare-specifier import map: internal imports of the vendored ES modules
         are bare, so they must be mapped to the self-hosted files. -->
    <script type="importmap">
      {
        "imports": {
          "preact": "/vendor/preact/preact.module.js",
          "preact/hooks": "/vendor/preact/hooks.module.js",
          "@preact/signals-core": "/vendor/signals/signals-core.module.js",
          "@preact/signals": "/vendor/signals/signals.module.js",
          "htm": "/vendor/htm/htm.module.js",
          "htm/preact": "/vendor/htm/preact.module.js",
          "preact-iso": "/vendor/preact-iso/index.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
